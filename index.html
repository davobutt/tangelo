<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tangelo Boggle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700&family=Bungee&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background:
                radial-gradient(circle at top, #243447 0%, #111827 60%),
                linear-gradient(140deg, #111827 0%, #0f172a 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Barlow', ui-sans-serif, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #game-root {
            width: 100vw;
            height: 100vh;
            display: grid;
            place-items: center;
        }

        #game-root canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div id="game-root"></div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
